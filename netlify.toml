[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Enable branch deploys for testing
[context.branch-deploy]
  command = "npm run build"

# Deploy previews for pull requests
[context.deploy-preview]
  command = "npm run build"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/.well-known/lnurlp/*"
  to = "https://lnbits.lightningpiggy.com/.well-known/lnurlp/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/lnurlp/*"
  to = "https://lnbits.lightningpiggy.com/lnurlp/:splat"
  status = 200
  force = true

# Subdomain: pos.lightningpiggy.com → /pos page
[[redirects]]
  from = "https://pos.lightningpiggy.com/*"
  to = "https://lightningpiggy.com/pos/:splat"
  status = 301
  force = true
